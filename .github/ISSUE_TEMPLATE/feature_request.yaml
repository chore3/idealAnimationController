name: ✨ 機能要望
description: 新機能の提案や既存機能の改善案を共有してください
title: ✨ [タイトル]
labels:
  - ✨ Enhancement

body:
  - type: markdown
    attributes:
      value: >-
        ## ✨ 機能要望ありがとうございます

        この Issue は、新機能や改善案を検討するためのものです。  

  - type: checkboxes
    id: confirmations
    attributes:
      label: 🛑 事前確認
      description: Issue を作成する前に、以下を確認してください。
      options:
        - label: 既存の機能要望 Issue を確認しました
          required: true
        - label: ドキュメントを確認し、未実装の機能であることを確認しました
          required: true
        - label: 最新バージョンを使用しています
          required: true
        - label: この Issue では **1 つの機能要望のみ** を記載しています
          required: true

  - type: markdown
    attributes:
      value: '---'

  - type: textarea
    id: description
    attributes:
      label: 📝 要望内容
      description: 現在困っていること、または不足している機能を説明してください。
      placeholder: >-
        電子レンジのなかが暗くて見えない。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 期待する解決策
      description: 実現したい挙動や、理想的な仕様を記載してください。
      placeholder: >-
        電子レンジに室内灯を追加してほしい
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🧪 検討した代替案
      description: 既に試した回避策や、他に考えた方法があれば記載してください。
